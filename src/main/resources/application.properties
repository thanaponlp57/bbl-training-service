# Context: same as project name
server.port=8000
server.servlet.context-path=/@project.artifactId@

# Application Details
app.name=@project.artifactId@
app.build.version=@project.version@
app.build.timestamp=@timestamp@

# H2 Database
spring.datasource.url=jdbc:h2:mem:bbl_training_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (local access only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT (RS256). Set JWT_PRIVATE_KEY / JWT_PUBLIC_KEY (Base64, PKCS8 private / X509 public
# DER) for a persistent RSA key pair shared across restarts and instances - generate one with:
#   openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out private.pem
#   openssl pkcs8 -topk8 -inform PEM -outform DER -in private.pem -nocrypt | base64 | tr -d '\n'
#   openssl rsa -in private.pem -pubout -outform DER | base64 | tr -d '\n'
# If unset, JwtService generates a fresh in-memory key pair on startup - fine for local
# dev/tests, but tokens won't survive a restart or validate across multiple instances.
jwt.private-key=${JWT_PRIVATE_KEY:}
jwt.public-key=${JWT_PUBLIC_KEY:}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}